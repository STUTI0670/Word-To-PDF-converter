<!DOCTYPE html>
<html>
<head>
  <title>Word to PDF Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      width: 350px;
    }

    h2 {
      margin-bottom: 15px;
      color: #333;
    }

    .upload-box {
      border: 2px dashed #ccc;
      padding: 25px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    .upload-box:hover {
      border-color: #4f46e5;
      background: #f0f0ff;
    }

    .upload-box.active {
      border-color: #4f46e5;
      background: #e0e7ff;
    }

    #fileName {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4338ca;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    #progressContainer {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 10px;
      margin-top: 15px;
      display: none;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: #4f46e5;
      border-radius: 10px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>

<div class="card">
  <h2 id="statusText">Upload Word File</h2>

  <div id="uploadBox" class="upload-box">
    Drag & Drop file OR Click
  </div>

  <div id="fileName"></div>

  <input type="file" id="fileInput" hidden />

  <button id="convertBtn" onclick="uploadFile()">Convert</button>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>
</div>

<script>
// Get HTML elements by their IDs for later use
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");
const fileNameDisplay = document.getElementById("fileName");

// click to open file picker
uploadBox.addEventListener("click", () => fileInput.click());

// When user selects a file from the file picker, show the filename
fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (file) {
    fileNameDisplay.innerText = "Selected: " + file.name;
  }
});

// DRAG & DROP FUNCTIONALITY
// When user drags file over the upload box, highlight it
uploadBox.addEventListener("dragover", (e) => {
  e.preventDefault(); // Prevent default browser behavior
  uploadBox.classList.add("active"); // Add CSS class to show active state
});

// When user moves mouse away from upload box, remove highlight
uploadBox.addEventListener("dragleave", () => {
  uploadBox.classList.remove("active");
});

// When user drops a file on the upload box, handle it
uploadBox.addEventListener("drop", (e) => {
  e.preventDefault(); // Prevent browser from opening the file
  uploadBox.classList.remove("active"); // Remove highlight

  // Get the first file from the dropped files
  const file = e.dataTransfer.files[0];
  if (file) {
    // Set the file to the hidden input and show its name
    fileInput.files = e.dataTransfer.files;
    fileNameDisplay.innerText = "Selected: " + file.name;
  }
});

// UPLOAD AND CONVERT FUNCTION
function uploadFile() {
  // Get the selected file
  const file = fileInput.files[0];

  // Check if a file was selected
  if (!file) {
    alert("Select a file first");
    return;
  }

  // Get UI elements to update during upload
  const btn = document.getElementById("convertBtn");
  const status = document.getElementById("statusText");
  const progressContainer = document.getElementById("progressContainer");
  const progressBar = document.getElementById("progressBar");

  // Disable button and show "Converting..." message
  btn.disabled = true;
  status.innerText = "Converting...";
  progressContainer.style.display = "block";

  // Simulate progress bar animation (increases every 300ms)
  let progress = 0;
  const interval = setInterval(() => {
    progress += 10;
    progressBar.style.width = progress + "%";
    if (progress >= 90) clearInterval(interval); // Stop at 90% to wait for actual completion
  }, 300);

  // Create FormData object to send the file to the server
  const formData = new FormData();
  formData.append("file", file); // Add the selected file

  // Send the file to the backend server for conversion
  fetch("http://localhost:5000/convert", {
    method: "POST", // Use POST to send data
    body: formData // Send the file
  })
  .then(res => res.blob())  // Convert response to binary file data (PDF)
  .then(blob => {           // Received the PDF file successfully
    clearInterval(interval); // Stop the progress animation
    progressBar.style.width = "100%"; // Complete the progress bar

    // Convert blob to a downloadable URL
    const url = window.URL.createObjectURL(blob);

    // Create a temporary link element
    //you're creating an <a> (anchor/link) HTML element using JavaScript.What happens: document.createElement("a") — Creates a new <a> tag (same as <a href="..."> in HTML)
    //const a = — Stores it in variable a
    const a = document.createElement("a");
    // Set where the link points to (PDF file)
    a.href = url;
    // Set the filename to save as
    a.download = "converted.pdf";
    // Add it to the page (still invisible)
    document.body.appendChild(a);
    // Simulate clicking the link
    a.click();
    // Remove it from the page
    a.remove();

    // Free up memory by removing the object URL
    window.URL.revokeObjectURL(url);

    // Show success message and re-enable the button
    status.innerText = "Download complete!";
    btn.disabled = false;
  })
  .catch(err => {           // Handle any errors during conversion
    // Log error to browser console for debugging
    console.error(err);
    // Show error message to user
    status.innerText = "Error occurred!";
    // Re-enable the button so user can try again
    btn.disabled = false;
  });
}
</script>

</body>
</html>
